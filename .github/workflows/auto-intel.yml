name: Auto intel feed (@joinlockr)

# Each run, Claude (grounded on a live Polymarket/Kalshi volume signal) finds the
# day's most share-worthy real prediction-market / betting stories, writes on-brand
# news cards + captions, renders them via /api/intel-card, and SHIPS them. Runs on
# GitHub's servers (no machine needed).
#
# SETUP (repo Settings -> Secrets and variables -> Actions):
#   ANTHROPIC_API_KEY        (secret, already set for the blog)
# To auto-post straight to Instagram (the default once these exist) add secrets:
#   IG_USER_ID  and  IG_ACCESS_TOKEN   (Instagram Login path on graph.instagram.com:
#   an IG Business/Creator account + a 60-day long-lived token, kept alive by the
#   refresh-ig-token.yml workflow — see DISTRIBUTION.md for the exact walkthrough).
# OPTIONAL review/audit queue (a Discord webhook; also the manual-post fallback):
#   DISCORD_WEBHOOK_CONTENT  = a private #content-queue webhook (Edit Channel ->
#                              Integrations -> Webhooks -> New -> Copy URL).
# You need IG creds and/or the Discord webhook (at least one destination).
#
# PAUSE auto-post (run review-first instead): add repo VARIABLE INTEL_AUTOPOST = 0
# — posts then queue to Discord for a human. Set it back to 1 (or delete it) to
# resume hands-off posting. Disable entirely in the repo Actions tab.
#
# CADENCE: 3 posts/day, spread across morning / midday / evening, ONE post per slot,
# each slot weighted to a different LANE so the day's posts stay varied and never
# repeat the same hot story. Times are UTC (GitHub cron is UTC, and drifts ~1h vs ET
# across daylight saving — fine for a feed). To change volume: add/remove a cron line
# below (and its case in "Pick the angle"), or bump repo VARIABLE INTEL_COUNT.

on:
  schedule:
    # Off-the-minute on purpose (on-the-hour jobs are the most delayed by GitHub).
    - cron: "7 13 * * *" # ~9:07am ET — markets / industry / records lane
    - cron: "13 17 * * *" # ~1:13pm ET — big-win / longshot / payout lane
    - cron: "19 23 * * *" # ~7:19pm ET — World Cup / sports / heart-vs-market lane
  workflow_dispatch: {}

concurrency:
  group: auto-intel
  cancel-in-progress: false

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Pick the angle for this slot
        # Map the cron that fired this run to a content lane, so the 3 daily posts
        # favor different angles. Manual runs (workflow_dispatch) get no focus and
        # fall back to the script's default full-lane rotation.
        env:
          SCHED: ${{ github.event.schedule }}
        run: |
          case "$SCHED" in
            "7 13 "*)  FOCUS="market or volume records, platform milestones, industry/regulatory news, head-to-head venue races" ;;
            "13 17 "*) FOCUS="big wins, longshots that hit, wild bets placed, record payouts" ;;
            "19 23 "*) FOCUS="World Cup tentpole, heart-vs-market, a sports result that moved a market, odds shifts, wild stats" ;;
            *)         FOCUS="" ;;
          esac
          echo "INTEL_FOCUS=$FOCUS" >> "$GITHUB_ENV"
          echo "Slot angle: ${FOCUS:-(default rotation)}"
      - name: Generate + ship intel posts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DISCORD_WEBHOOK_CONTENT: ${{ secrets.DISCORD_WEBHOOK_CONTENT }}
          INTEL_COUNT: ${{ vars.INTEL_COUNT || '1' }}
          INTEL_FOCUS: ${{ env.INTEL_FOCUS }}
          INTEL_AUTOPOST: ${{ vars.INTEL_AUTOPOST }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_API_VERSION: ${{ vars.IG_API_VERSION }}
        run: node scripts/generate-intel.mjs
